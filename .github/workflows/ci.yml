name: CI

on:
  push:
    branches:
      - main
      - develop
      - feat/**
      - fix/**
      - chore/**
      - refactor/**
      - docs/**
      - test/**
  pull_request:

jobs:
  backend:
    name: Backend CI
    runs-on: ubuntu-24.04

    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_DB: meteodb
          POSTGRES_USER: infoclimat
          POSTGRES_PASSWORD: infoclimat2026
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U infoclimat -d meteodb"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      DEBUG: "true"
      SECRET_KEY: ci-secret-key
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_NAME: meteodb
      DB_USER: infoclimat
      DB_PASSWORD: infoclimat2026
      CORS_ALLOWED_ORIGINS: http://localhost:3000

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync backend dependencies
        working-directory: backend
        run: uv sync --extra dev

      - name: Run backend lint
        working-directory: backend
        run: uv run ruff check .

      - name: Check backend formatting
        working-directory: backend
        run: uv run ruff format --check .

      - name: Apply migrations
        working-directory: backend
        run: uv run python manage.py migrate

      - name: Run backend tests
        working-directory: backend
        run: uv run pytest --junitxml=test-report.xml

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report
          path: backend/test-report.xml

  frontend:
    name: Frontend CI
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend lint
        working-directory: frontend
        run: npm run lint

      - name: Run frontend unit tests
        working-directory: frontend
        run: npm run test:unit

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Run frontend audit
        working-directory: frontend
        run: npm audit --audit-level=high

  security:
    name: Security Scan
    runs-on: ubuntu-24.04
    needs:
      - backend
      - frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          format: json
          output: trivy-report.json

      - name: Upload Trivy report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-report.json

  docker:
    name: Build & Push Docker Images
    runs-on: ubuntu-24.04
    needs:
      - backend
      - frontend
      - security
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/backend:latest
            ghcr.io/${{ github.repository }}/backend:${{ github.sha }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/frontend:latest
            ghcr.io/${{ github.repository }}/frontend:${{ github.sha }}
